<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Inventory</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }
    h1, h2, h3 { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px 12px;
      margin: 6px 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-light { background: #e5e7eb; color: #111827; }
    .btn-warning { background: #d97706; color: #fff; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f3f4f6; }

    .hidden { display: none; }

    .center-box {
      max-width: 420px;
      margin: 80px auto;
    }

    .company-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .company-name {
      font-weight: bold;
      font-size: 16px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .error {
      color: #dc2626;
      font-size: 14px;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .empty {
      padding: 16px;
      background: #f9fafb;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="center-box">
      <div class="card">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username" />
        <input type="password" id="loginPass" placeholder="Password" />
        <div id="loginError" class="error hidden">Username หรือ Password ไม่ถูกต้อง</div>
        <button class="btn-primary" onclick="login()">Login</button>
      </div>
    </div>

    <!-- COMPANY PAGE -->
    <div id="companyPage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>Company List</h1>
            <div class="muted">เพิ่ม / ลบบริษัท แล้วกด Save</div>
          </div>
          <div>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <input type="text" id="searchInput" placeholder="ค้นหาบริษัท..." onkeyup="renderCompanies()" />

        <button class="btn-primary" onclick="renderCompanies()">ค้นหา</button>
        <button class="btn-primary" onclick="showAddCompanyPage()">Add Company</button>
        <button class="btn-success" onclick="saveCompanies()">Save Companies</button>

        <div id="companyList"></div>
        <div id="noResults" class="empty hidden">ไม่พบข้อมูลที่ค้นหา</div>
      </div>
    </div>

    <!-- ADD COMPANY PAGE -->
    <div id="addCompanyPage" class="hidden">
      <div class="card center-box">
        <h2>Add Company</h2>
        <input type="text" id="companyNameInput" placeholder="Company Name" />
        <button class="btn-success" onclick="confirmAddCompany()">OK</button>
        <button class="btn-light" onclick="showCompanyPage()">Cancel</button>
      </div>
    </div>

    <!-- DEVICE PAGE -->
    <div id="devicePage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 id="devicePageTitle">Devices</h2>
            <div class="muted">เพิ่ม / ลบอุปกรณ์ แล้วกด Save</div>
          </div>
          <div>
            <button class="btn-light" onclick="backToCompanies()">Back</button>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <input type="text" id="deviceNameInput" placeholder="Device Name" />
        <input type="text" id="deviceIpInput" placeholder="IP Address" />
        <input type="text" id="deviceUserInput" placeholder="Username" />
        <input type="text" id="devicePassInput" placeholder="Password" />

        <div id="deviceError" class="error hidden">กรอก Device / IP / Username / Password ให้ครบก่อน</div>

        <button id="addDeviceBtn" class="btn-primary" onclick="addDevice()">Add Device</button>
        <button class="btn-success" onclick="saveDevices()">Save Devices</button>

        <div id="deviceTableWrap"></div>
      </div>
    </div>

  </div>

  <script>
    const USERS = [
      { user: "ccadmin", pass: "CC$upp0rt#1" },
      { user: "admin", pass: "12345678" }
    ];

    let companies = [];
    let selectedCompanyId = null;

    function uid() {
      return Date.now().toString() + Math.floor(Math.random() * 1000).toString();
    }

    function loadData() {
      const data = localStorage.getItem("ip_inventory_data");

      if (data) {
        companies = JSON.parse(data);
      } else {
        companies = [
          {
            id: uid(),
            name: "ABC Co.,Ltd.",
            devices: [
              { id: uid(), name: "FortiGate", ip: "192.168.1.1", user: "admin", pass: "pass123" },
              { id: uid(), name: "Switch", ip: "192.168.1.2", user: "cisco", pass: "cisco123" }
            ]
          },
          {
            id: uid(),
            name: "XYZ Co.,Ltd.",
            devices: [
              { id: uid(), name: "Access Point", ip: "10.0.0.1", user: "ubnt", pass: "ubnt123" }
            ]
          }
        ];
        persist();
      }
    }

    function persist() {
      localStorage.setItem("ip_inventory_data", JSON.stringify(companies));
    }

    function login() {
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value.trim();
      const err = document.getElementById("loginError");

      const found = USERS.find(x => x.user === u && x.pass === p);

      if (found) {
        sessionStorage.setItem("ip_inventory_logged_in", "1");
        err.classList.add("hidden");
        showCompanyPage();
      } else {
        err.classList.remove("hidden");
      }
    }

    function logout() {
      sessionStorage.removeItem("ip_inventory_logged_in");
      selectedCompanyId = null;
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      showLoginPage();
    }

    function isLoggedIn() {
      return sessionStorage.getItem("ip_inventory_logged_in") === "1";
    }

    function hideAllPages() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("companyPage").classList.add("hidden");
      document.getElementById("addCompanyPage").classList.add("hidden");
      document.getElementById("devicePage").classList.add("hidden");
    }

    function showLoginPage() {
      hideAllPages();
      document.getElementById("loginPage").classList.remove("hidden");
    }

    function showCompanyPage() {
      hideAllPages();
      document.getElementById("companyPage").classList.remove("hidden");
      renderCompanies();
    }

    function showAddCompanyPage() {
      hideAllPages();
      document.getElementById("addCompanyPage").classList.remove("hidden");
      document.getElementById("companyNameInput").value = "";
      document.getElementById("companyNameInput").focus();
    }

    function confirmAddCompany() {
      const input = document.getElementById("companyNameInput");
      const name = input.value.trim();

      if (!name) {
        alert("กรุณากรอกชื่อบริษัท");
        return;
      }

      companies.push({
        id: uid(),
        name: name,
        devices: []
      });

      persist();
      showCompanyPage();
    }

    function deleteCompany(companyId) {
      if (!confirm("ลบบริษัทนี้ใช่ไหม?")) return;

      companies = companies.filter(c => c.id !== companyId);
      persist();
      renderCompanies();
    }

    function saveCompanies() {
      persist();
      alert("บันทึกบริษัทเรียบร้อย");
    }

    function renderCompanies() {
      const wrap = document.getElementById("companyList");
      const query = document.getElementById("searchInput").value.toLowerCase();

      const filteredCompanies = companies.filter(company =>
        company.name.toLowerCase().includes(query)
      );

      if (filteredCompanies.length === 0) {
        document.getElementById("noResults").classList.remove("hidden");
        wrap.innerHTML = "";
        return;
      }

      document.getElementById("noResults").classList.add("hidden");

      wrap.innerHTML = filteredCompanies.map(company => `
        <div class="company-item">
          <div>
            <div class="company-name">${escapeHtml(company.name)}</div>
            <div class="muted">Devices: ${company.devices.length}</div>
          </div>
          <div>
            <button class="btn-warning" onclick="showDevicePage('${company.id}')">Open</button>
            <button class="btn-danger" onclick="deleteCompany('${company.id}')">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function showDevicePage(companyId) {
      selectedCompanyId = companyId;
      const company = companies.find(c => c.id === companyId);

      if (!company) return;

      hideAllPages();
      document.getElementById("devicePage").classList.remove("hidden");
      document.getElementById("devicePageTitle").innerText = "Devices - " + company.name;
      document.getElementById("deviceError").classList.add("hidden");

      resetDeviceButton();
      clearDeviceInputs();
      renderDevices();
    }

    function backToCompanies() {
      showCompanyPage();
    }

    function addDevice() {
      const name = document.getElementById("deviceNameInput").value.trim();
      const ip = document.getElementById("deviceIpInput").value.trim();
      const user = document.getElementById("deviceUserInput").value.trim();
      const pass = document.getElementById("devicePassInput").value.trim();
      const err = document.getElementById("deviceError");

      if (!name || !ip || !user || !pass) {
        err.classList.remove("hidden");
        return;
      }

      err.classList.add("hidden");

      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      company.devices.push({
        id: uid(),
        name,
        ip,
        user,
        pass
      });

      persist();
      clearDeviceInputs();
      renderDevices();
    }

    function clearDeviceInputs() {
      document.getElementById("deviceNameInput").value = "";
      document.getElementById("deviceIpInput").value = "";
      document.getElementById("deviceUserInput").value = "";
      document.getElementById("devicePassInput").value = "";
    }

    function deleteDevice(deviceId) {
      if (!confirm("ลบอุปกรณ์นี้ใช่ไหม?")) return;

      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      company.devices = company.devices.filter(d => d.id !== deviceId);

      persist();
      renderDevices();
    }

    function saveDevices() {
      persist();
      alert("บันทึกอุปกรณ์เรียบร้อย");
    }

    function renderDevices() {
      const wrap = document.getElementById("deviceTableWrap");
      const company = companies.find(c => c.id === selectedCompanyId);

      if (!company) return;

      if (company.devices.length === 0) {
        wrap.innerHTML = '<div class="empty">ยังไม่มีอุปกรณ์ในบริษัทนี้</div>';
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>IP</th>
              <th>Username</th>
              <th>Password</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${company.devices.map(device => `
              <tr>
                <td>${escapeHtml(device.name)}</td>
                <td>${escapeHtml(device.ip)}</td>
                <td>${escapeHtml(device.user)}</td>
                <td>${escapeHtml(device.pass)}</td>
                <td>
                  <button class="btn-warning" onclick="editDevice('${device.id}')">Edit</button>
                  <button class="btn-danger" onclick="deleteDevice('${device.id}')">Delete</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function editDevice(deviceId) {
      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      const device = company.devices.find(d => d.id === deviceId);
      if (!device) return;

      document.getElementById("deviceNameInput").value = device.name;
      document.getElementById("deviceIpInput").value = device.ip;
      document.getElementById("deviceUserInput").value = device.user;
      document.getElementById("devicePassInput").value = device.pass;

      const btn = document.getElementById("addDeviceBtn");
      btn.innerText = "Update Device";
      btn.onclick = function() {
        updateDevice(deviceId);
      };
    }

    function updateDevice(deviceId) {
      const name = document.getElementById("deviceNameInput").value.trim();
      const ip = document.getElementById("deviceIpInput").value.trim();
      const user = document.getElementById("deviceUserInput").value.trim();
      const pass = document.getElementById("devicePassInput").value.trim();
      const err = document.getElementById("deviceError");

      if (!name || !ip || !user || !pass) {
        err.classList.remove("hidden");
        return;
      }

      err.classList.add("hidden");

      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      const device = company.devices.find(d => d.id === deviceId);
      if (!device) return;

      device.name = name;
      device.ip = ip;
      device.user = user;
      device.pass = pass;

      persist();
      clearDeviceInputs();
      resetDeviceButton();
      renderDevices();
    }

    function resetDeviceButton() {
      const btn = document.getElementById("addDeviceBtn");
      btn.innerText = "Add Device";
      btn.onclick = addDevice;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadData();

    if (isLoggedIn()) {
      showCompanyPage();
    } else {
      showLoginPage();
    }
  </script>
</body>
</html>
