<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Customer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }

    h1, h2, h3 { margin-top: 0; }

    input {
      width: 100%;
      padding: 10px 12px;
      margin: 6px 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-light { background: #e5e7eb; color: #111827; }
    .btn-warning { background: #d97706; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }

    .hidden { display: none; }

    .center-box {
      max-width: 420px;
      margin: 80px auto;
    }

    .company-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .company-item:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .company-name {
      font-weight: bold;
      font-size: 16px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .error {
      color: #dc2626;
      font-size: 14px;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    .empty {
      padding: 16px;
      background: #f9fafb;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      color: #475569;
      margin-top: 12px;
    }

    #toast {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      min-width: 260px;
      max-width: 360px;
      background: #16a34a;
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,.18);
      font-weight: bold;
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      transition: all .3s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.error-toast {
      background: #dc2626;
    }

    .device-tools {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 18px 0 10px;
      flex-wrap: wrap;
    }

    .device-search {
      flex: 1;
      min-width: 260px;
      margin: 0;
    }

    .device-count {
      background: #eef2ff;
      color: #1e40af;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      margin-top: 10px;
    }

    .device-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    .device-table th {
      background: #f8fafc;
      color: #111827;
      font-weight: bold;
      font-size: 14px;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .device-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px;
      vertical-align: top;
    }

    .device-table tr:hover {
      background: #f9fafb;
    }

    .device-name-cell {
      font-weight: bold;
      color: #111827;
      max-width: 240px;
      word-break: break-word;
    }

    .ip-cell {
      font-family: Consolas, monospace;
      color: #0f172a;
      word-break: break-word;
    }

    .pass-cell {
      font-family: Consolas, monospace;
      color: #374151;
      word-break: break-word;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
      white-space: nowrap;
    }

    .action-buttons button {
      margin: 0;
    }

    .device-table th:last-child,
    .device-table td:last-child {
      min-width: 160px;
      white-space: nowrap;
    }

    .table-input {
      width: 100%;
      margin: 0;
      padding: 8px 10px;
    }
  </style>
</head>

<body>

  <div id="toast"></div>

  <div class="container">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="center-box">
      <div class="card">
        <h2>IP Customer Login</h2>
        <input type="text" id="loginUser" placeholder="Username" />
        <input type="password" id="loginPass" placeholder="Password" />
        <div id="loginError" class="error hidden">Username หรือ Password ไม่ถูกต้อง</div>
        <button class="btn-primary" onclick="login()">Login</button>
      </div>
    </div>

    <!-- COMPANY PAGE -->
    <div id="companyPage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>Company List</h1>
            <div class="muted">ข้อมูลบันทึกลง Supabase เปิดจากเครื่องอื่นจะเห็นข้อมูลเดียวกัน</div>
          </div>
          <div>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <input type="text" id="searchInput" placeholder="ค้นหาบริษัท..." onkeyup="renderCompanies()" />

        <button class="btn-primary" onclick="renderCompanies()">ค้นหา</button>
        <button class="btn-primary" onclick="showAddCompanyPage()">Add Company</button>

        <input type="file" id="excelFile" accept=".xlsx,.xls" class="hidden" onchange="importExcel(event)" />
        <button class="btn-success" onclick="document.getElementById('excelFile').click()">Import Excel</button>

        <div id="companyList"></div>
        <div id="noResults" class="empty hidden">ไม่พบข้อมูลที่ค้นหา</div>
      </div>
    </div>

    <!-- ADD COMPANY PAGE -->
    <div id="addCompanyPage" class="hidden">
      <div class="card center-box">
        <h2>Add Company</h2>
        <input type="text" id="companyNameInput" placeholder="Company Name" />
        <button class="btn-success" onclick="confirmAddCompany()">OK</button>
        <button class="btn-light" onclick="showCompanyPage()">Cancel</button>
      </div>
    </div>

    <!-- DEVICE PAGE -->
    <div id="devicePage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 id="devicePageTitle">Devices</h2>
            <div class="muted">เพิ่ม / ลบ / แก้ไขอุปกรณ์ ระบบจะบันทึกอัตโนมัติ</div>
          </div>
          <div>
            <button class="btn-light" onclick="backToCompanies()">Back</button>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <input type="text" id="deviceNameInput" placeholder="Device Name" />
        <input type="text" id="deviceIpInput" placeholder="IP Address" />
        <input type="text" id="deviceUserInput" placeholder="Username" />
        <input type="text" id="devicePassInput" placeholder="Password" />

        <div id="deviceError" class="error hidden">กรอก Device Name อย่างน้อย 1 ช่อง</div>

        <button id="addDeviceBtn" class="btn-primary" onclick="addDevice()">Add Device</button>

        <div class="device-tools">
          <input
            type="text"
            id="deviceSearchInput"
            class="device-search"
            placeholder="ค้นหา Device / IP / Username / Password..."
            onkeyup="renderDevices()"
          />
          <div id="deviceCount" class="device-count">Devices: 0</div>
        </div>

        <div id="deviceTableWrap"></div>
      </div>
    </div>

    <!-- ADD DEVICE PAGE -->
    <div id="addDevicePage" class="hidden">
      <div class="card center-box">
        <h2>Add Device</h2>
        <input type="text" id="deviceNameInput" placeholder="Device Name" />
        <input type="text" id="deviceIpInput" placeholder="IP Address" />
        <input type="text" id="deviceUserInput" placeholder="Username" />
        <input type="text" id="devicePassInput" placeholder="Password" />
        <button class="btn-success" onclick="confirmAddDevice()">OK</button>
        <button class="btn-light" onclick="backToDevices()">Cancel</button>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://axluexlgltkrmnytswwq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_qgjQeHyWCoBQ2ruSu5vfAg_MagAFIul";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const USERS = [
      { user: "ccadmin", pass: "CC$upp0rt#1" },
      { user: "admin", pass: "12345678" }
    ];

    let companies = [];
    let selectedCompanyId = null;

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");

      toast.innerText = message;
      toast.className = "";

      if (type === "error") {
        toast.classList.add("error-toast");
      }

      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    async function loadData() {
      const { data, error } = await db
        .from("companies")
        .select(`
          id,
          name,
          created_at,
          devices (
            id,
            name,
            ip,
            username,
            password,
            created_at
          )
        `)
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        showToast("โหลดข้อมูลจาก Supabase ไม่สำเร็จ ❌", "error");
        companies = [];
        return;
      }

      companies = (data || []).map(company => ({
        id: company.id,
        name: company.name,
        devices: (company.devices || []).map(device => ({
          id: device.id,
          name: device.name || "",
          ip: device.ip || "",
          user: device.username || "",
          pass: device.password || ""
        }))
      }));
    }

    async function login() {
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value.trim();
      const err = document.getElementById("loginError");

      const found = USERS.find(x => x.user === u && x.pass === p);

      if (found) {
        sessionStorage.setItem("ip_inventory_logged_in", "1");
        err.classList.add("hidden");
        await showCompanyPage(true);
        showToast("เข้าสู่ระบบเรียบร้อย ✅");
      } else {
        err.classList.remove("hidden");
        showToast("Username หรือ Password ไม่ถูกต้อง ❌", "error");
      }
    }

    function logout() {
      sessionStorage.removeItem("ip_inventory_logged_in");
      selectedCompanyId = null;
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      replaceAppState("login");
      showLoginPage(false);
    }

    function isLoggedIn() {
      return sessionStorage.getItem("ip_inventory_logged_in") === "1";
    }

    function hideAllPages() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("companyPage").classList.add("hidden");
      document.getElementById("addCompanyPage").classList.add("hidden");
      document.getElementById("devicePage").classList.add("hidden");
      document.getElementById("addDevicePage").classList.add("hidden");
    }

    function showLoginPage(push = true) {
      hideAllPages();
      document.getElementById("loginPage").classList.remove("hidden");

      if (push) {
        pushAppState("login");
      }
    }

    async function showCompanyPage(push = true) {
      hideAllPages();
      document.getElementById("companyPage").classList.remove("hidden");
      selectedCompanyId = null;
      await loadData();
      renderCompanies();

      if (push) {
        pushAppState("company");
      }
    }

    function showAddCompanyPage(push = true) {
      hideAllPages();
      document.getElementById("addCompanyPage").classList.remove("hidden");
      document.getElementById("companyNameInput").value = "";
      document.getElementById("companyNameInput").focus();

      if (push) {
        pushAppState("addCompany");
      }
    }

    async function confirmAddCompany() {
      const input = document.getElementById("companyNameInput");
      const name = input.value.trim();

      if (!name) {
        showToast("กรุณากรอกชื่อบริษัท ❌", "error");
        return;
      }

      const exists = companies.find(c => c.name.toLowerCase() === name.toLowerCase());
      if (exists) {
        showToast("มีบริษัทนี้อยู่แล้ว ❌", "error");
        return;
      }

      const { error } = await db
        .from("companies")
        .insert([{ name: name }]);

      if (error) {
        console.error(error);
        showToast("เพิ่มบริษัทไม่สำเร็จ ❌", "error");
        return;
      }

      await showCompanyPage(true);
      showToast("เพิ่มบริษัทเรียบร้อย ✅");
    }

    async function deleteCompany(companyId) {
      if (!confirm("ลบบริษัทนี้ใช่ไหม?")) return;

      const { error } = await db
        .from("companies")
        .delete()
        .eq("id", companyId);

      if (error) {
        console.error(error);
        showToast("ลบบริษัทไม่สำเร็จ ❌", "error");
        return;
      }

      await showCompanyPage(false);
      showToast("ลบบริษัทเรียบร้อย ✅");
    }

    function renderCompanies() {
      const wrap = document.getElementById("companyList");
      const query = document.getElementById("searchInput").value.toLowerCase();

      const filteredCompanies = companies.filter(company =>
        company.name.toLowerCase().includes(query)
      );

      if (filteredCompanies.length === 0) {
        document.getElementById("noResults").classList.remove("hidden");
        wrap.innerHTML = "";
        return;
      }

      document.getElementById("noResults").classList.add("hidden");

      wrap.innerHTML = filteredCompanies.map(company => `
        <div class="company-item">
          <div>
            <div class="company-name">${escapeHtml(company.name)}</div>
            <div class="muted">Devices: ${company.devices.length}</div>
          </div>
          <div>
            <button class="btn-warning" onclick="showDevice
