<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Customer - Modern UI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #2563eb;
      --bg-body: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', 'Kanit', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--card-shadow);
      border: 1px solid #e2e8f0;
    }

    /* Top Navigation Section */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    h2 { font-size: 28px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.02em; }
    .muted { color: var(--text-muted); font-size: 14px; }

    /* Buttons Style */
    button {
      font-family: inherit;
      font-weight: 500;
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,0.3); }

    .btn-light { background: #f1f5f9; color: #475569; }
    .btn-light:hover { background: #e2e8f0; }

    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }

    .btn-warning { background: #fef3c7; color: #d97706; }
    .btn-warning:hover { background: #fde68a; }

    /* Search & Tools */
    .search-box {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    .search-box:focus { border-color: var(--primary); background: #fff; }

    /* Modern Table Design */
    .table-wrap {
      margin-top: 24px;
      overflow-x: auto;
      border: 1px solid #f1f5f9;
      border-radius: 12px;
    }

    .device-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    .device-table th {
      background: #f8fafc;
      padding: 16px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 2px solid #f1f5f9;
      text-align: left;
    }

    .device-table td {
      padding: 18px 16px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
      font-size: 15px;
    }

    .device-table tr:last-child td { border-bottom: none; }
    .device-table tr:hover { background: #fafafa; }

    /* Style for sensitive data */
    .code-badge {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      background: #f1f5f9;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: #334155;
    }

    .device-name { font-weight: 600; color: #0f172a; }
    .action-group { display: flex; gap: 8px; }

    /* Tooltip-like count box */
    .count-badge {
      background: #e0e7ff;
      color: #4338ca;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div id="devicePage" class="card">
    <div class="topbar">
      <div>
        <h2 id="devicePageTitle">Devices - NESDC</h2>
        <div class="muted">จัดการอุปกรณ์ภายในบริษัทนี้</div>
      </div>
      <div class="action-group">
        <button class="btn-light" onclick="history.back()">Back</button>
        <button class="btn-light" style="background: #334155; color: white;">Logout</button>
      </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <button class="btn-primary" onclick="openAddDeviceModal()">
        <span>+</span> Add New Device
      </button>
      <div class="count-badge" id="deviceCount">Devices: 161 / 161</div>
    </div>

    <input type="text" class="search-box" placeholder="ค้นหาชื่อ, IP, User..." onkeyup="renderDevices()">

    <div class="table-wrap">
      <table class="device-table">
        <thead>
          <tr>
            <th style="width: 30%;">Device</th>
            <th style="width: 25%;">IP / URL</th>
            <th style="width: 15%;">Username</th>
            <th style="width: 15%;">Password</th>
            <th style="width: 15%;">Action</th>
          </tr>
        </thead>
        <tbody id="deviceTableBody">
          <tr>
            <td>
              <div class="device-name">Firewall (Palo)</div>
            </td>
            <td><span class="code-badge">https://172.30.99.180</span></td>
            <td class="muted">one</td>
            <td><span class="code-badge">Nesdc@g0th</span></td>
            <td>
              <div class="action-group">
                <button class="btn-warning" style="padding: 6px 12px; font-size: 13px;">Edit</button>
                <button class="btn-danger" style="padding: 6px 12px; font-size: 13px;">Delete</button>
              </div>
            </td>
          </tr>
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>

        </div>
      </td>
    </tr>
  `).join("");
  */
</script>

</body>
</html>
