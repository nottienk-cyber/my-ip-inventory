<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Customer Inventory - Full Pagination System</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; font-family: 'Inter', 'Kanit', sans-serif; }
    body { background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; padding: 20px; }
    .hidden { display: none !important; }
    
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border-radius: 16px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); }

    /* --- TABLE UI (Copy Friendly) --- */
    .table-wrap { margin-top: 15px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: white; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { background: #f8fafc; padding: 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
    td { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--border); 
      font-size: 14px; 
      vertical-align: top; 
      /* แก้ไขปัญหาข้อความยาว: ให้ตัดคำขึ้นบรรทัดใหม่เพื่อให้ลาก Copy ได้ทั้งหมด */
      word-wrap: break-word; 
      word-break: break-all; 
      white-space: normal; 
    }

    .col-device { width: 28%; }
    .col-ip     { width: 27%; }
    .col-user   { width: 15%; }
    .col-pass   { width: 15%; }
    .col-action { width: 15%; text-align: center; }

    .code-badge { font-family: monospace; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-size: 13px; color: #334155; display: inline-block; word-break: break-all; }

    /* --- PAGINATION & CONTROLS --- */
    .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 10px; }
    .page-controls { display: flex; align-items: center; gap: 8px; }
    .page-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .page-btn:disabled { cursor: not-allowed; opacity: 0.4; }
    .page-btn:not(:disabled):hover { background: #f1f5f9; border-color: var(--primary); color: var(--primary); }
    .current-page { font-weight: 600; padding: 0 10px; }
    
    select.rows-select { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; cursor: pointer; }

    /* --- BUTTONS & MODAL --- */
    button { padding: 10px 18px; border-radius: 10px; cursor: pointer; border: none; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-light { background: #f1f5f9; color: #475569; }
    .btn-warning { background: #fef3c7; color: #d97706; padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #dc2626; padding: 6px 12px; font-size: 12px; }

    input.form-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; outline: none; }
    .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
    .company-item { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
    .company-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 450px; max-width: 90%; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="loginPage" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h2 style="margin-bottom: 10px;">IP Inventory Login</h2>
    <p style="color: var(--muted); margin-bottom: 25px;">Management System</p>
    <input type="text" id="loginUser" class="form-input" placeholder="Username">
    <input type="password" id="loginPass" class="form-input" placeholder="Password">
    <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="login()">Login</button>
  </div>

  <div id="companyPage" class="hidden">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Company List</h2>
        <button class="btn-light" onclick="logout()">Logout</button>
      </div>
      <div id="companyGrid" class="company-grid"></div>
    </div>
  </div>

  <div id="devicePage" class="hidden">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
        <div>
          <h2 id="deviceTitle" style="margin:0">Devices</h2>
          <p id="deviceSubtitle" style="color:var(--muted); font-size:14px; margin-top:5px;"></p>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn-light" onclick="showPage('companyPage')">Back</button>
          <button class="btn-primary" onclick="openModal()">+ Add Device</button>
        </div>
      </div>

      <div class="controls-row">
        <div>
          Show 
          <select id="rowsPerPage" class="rows-select" onchange="changeRowsPerPage()">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
          entries
        </div>
        <input type="text" id="searchDev" class="form-input" style="width: 280px; margin-bottom:0;" placeholder="ค้นหาชื่อ, IP, User..." onkeyup="renderDevices()">
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-device">Device Name</th>
              <th class="col-ip">IP / URL</th>
              <th class="col-user">Username</th>
              <th class="col-pass">Password</th>
              <th class="col-action">Action</th>
            </tr>
          </thead>
          <tbody id="deviceTableBody"></tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <div id="pageInfo" style="font-size: 14px; color: var(--muted);">Showing 0 to 0 of 0 entries</div>
        <div class="page-controls">
          <button id="prevBtn" class="page-btn" onclick="changePage(-1)">Previous</button>
          <span id="currentPageNum" class="current-page">1</span>
          <button id="nextBtn" class="page-btn" onclick="changePage(1)">Next</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="deviceModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0">Device Information</h3>
    <input type="text" id="inName" class="form-input" placeholder="Device Name">
    <input type="text" id="inIp" class="form-input" placeholder="IP Address / URL">
    <input type="text" id="inUser" class="form-input" placeholder="Username">
    <input type="text" id="inPass" class="form-input" placeholder="Password">
    <div style="display: flex; gap: 10px;">
      <button class="btn-light" style="flex: 1; justify-content: center;" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-primary" style="flex: 1; justify-content: center;" onclick="saveDevice()">บันทึกข้อมูล</button>
    </div>
  </div>
</div>

<script>
  // --- CONFIG ---
  const SUPABASE_URL = "https://axluexlgltkrmnytswwq.supabase.co";
  const SUPABASE_KEY = "sb_publishable_qgjQeHyWCoBQ2ruSu5vfAg_MagAFIul";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allCompanies = [], allDevices = [], selectedCompany = null, editingDeviceId = null;
  let currentPage = 1, rowsPerPage = 10;

  // --- NAVIGATION ---
  function showPage(pageId) {
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'companyPage') loadCompanies();
  }

  function login() {
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPass").value.trim();
    if ((u === "admin" && p === "12345678") || (u === "ccadmin" && p === "CC$upp0rt#1")) {
      sessionStorage.setItem("isLoggedIn", "true");
      showPage('companyPage');
    } else { alert("Login Failed"); }
  }

  function logout() { sessionStorage.clear(); window.location.reload(); }

  // --- COMPANY LOGIC ---
  async function loadCompanies() {
    const { data } = await db.from('companies').select('*').order('name');
    allCompanies = data || [];
    const grid = document.getElementById("companyGrid");
    grid.innerHTML = allCompanies.map(c => `
      <div class="company-item" onclick="goToDevices('${c.id}', '${c.name}')">
        <strong>${c.name}</strong>
        <span style="color: var(--primary); font-size: 20px;">→</span>
      </div>
    `).join("");
  }

  // --- DEVICE LOGIC ---
  async function goToDevices(id, name) {
    selectedCompany = { id, name };
    document.getElementById("deviceTitle").innerText = name;
    document.getElementById("deviceSubtitle").innerText = "รายการอุปกรณ์ทั้งหมด";
    currentPage = 1; 
    showPage('devicePage');
    loadDevices();
  }

  async function loadDevices() {
    const { data } = await db.from('devices').select('*').eq('company_id', selectedCompany.id).order('created_at', {ascending: false});
    allDevices = data || [];
    renderDevices();
  }

  function renderDevices() {
    const tbody = document.getElementById("deviceTableBody");
    const term = document.getElementById("searchDev").value.toLowerCase();
    
    // 1. Filter
    const filtered = allDevices.filter(d => 
      (d.name || "").toLowerCase().includes(term) || (d.ip || "").toLowerCase().includes(term) || (d.username || "").toLowerCase().includes(term)
    );

    // 2. Pagination
    const totalEntries = filtered.length;
    const totalPages = Math.ceil(totalEntries / rowsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * rowsPerPage;
    const end = start + parseInt(rowsPerPage);
    const paginatedItems = filtered.slice(start, end);

    // 3. Render
    tbody.innerHTML = paginatedItems.map(d => `
      <tr>
        <td style="font-weight:600;">${d.name || '-'}</td>
        <td><span class="code-badge">${d.ip || '-'}</span></td>
        <td>${d.username || '-'}</td>
        <td><span class="code-badge">${d.password || '-'}</span></td>
        <td class="col-action">
          <div style="display:flex; justify-content:center; gap:4px;">
            <button class="btn-warning" onclick="editDevice('${d.id}')">Edit</button>
            <button class="btn-danger" onclick="deleteDevice('${d.id}')">Del</button>
          </div>
        </td>
      </tr>
    `).join("");

    // 4. Update Pagination UI
    document.getElementById("currentPageNum").innerText = currentPage;
    document.getElementById("prevBtn").disabled = (currentPage === 1);
    document.getElementById("nextBtn").disabled = (currentPage === totalPages || totalEntries === 0);
    
    const displayEnd = end > totalEntries ? totalEntries : end;
    const displayStart = totalEntries === 0 ? 0 : start + 1;
    document.getElementById("pageInfo").innerText = `Showing ${displayStart} to ${displayEnd} of ${totalEntries} entries`;
  }

  // --- HANDLERS ---
  function changePage(dir) { currentPage += dir; renderDevices(); }
  function changeRowsPerPage() { rowsPerPage = document.getElementById("rowsPerPage").value; currentPage = 1; renderDevices(); }

  function openModal(id = null) {
    editingDeviceId = id;
    if(id) {
      const d = allDevices.find(x => x.id === id);
      document.getElementById("inName").value = d.name;
      document.getElementById("inIp").value = d.ip;
      document.getElementById("inUser").value = d.username;
      document.getElementById("inPass").value = d.password;
      document.getElementById("modalTitle").innerText = "แก้ไขข้อมูลอุปกรณ์";
    } else {
      ["inName", "inIp", "inUser", "inPass"].forEach(i => document.getElementById(i).value = "");
      document.getElementById("modalTitle").innerText = "เพิ่มอุปกรณ์ใหม่";
    }
    document.getElementById("deviceModal").classList.remove("hidden");
  }

  function closeModal() { document.getElementById("deviceModal").classList.add("hidden"); }

  async function saveDevice() {
    const payload = {
      name: document.getElementById("inName").value,
      ip: document.getElementById("inIp").value,
      username: document.getElementById("inUser").value,
      password: document.getElementById("inPass").value,
      company_id: selectedCompany.id
    };
    if(editingDeviceId) await db.from('devices').update(payload).eq('id', editingDeviceId);
    else await db.from('devices').insert([payload]);
    closeModal(); loadDevices();
  }

  async function deleteDevice(id) {
    if(confirm("ลบอุปกรณ์นี้?")) { await db.from('devices').delete().eq('id', id); loadDevices(); }
  }

  function editDevice(id) { openModal(id); }

  window.onload = () => { if(sessionStorage.getItem("isLoggedIn")) showPage('companyPage'); };
</script>
</body>
</html>
