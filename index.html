<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IP Customer</title>

<!-- Excel Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial; background:#f4f6f8; }
.container { max-width:1000px; margin:30px auto; padding:20px; }

.card {
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
}

.btn-primary{background:#2563eb;color:#fff;}
.btn-success{background:#16a34a;color:#fff;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-warning{background:#d97706;color:#fff;}
.btn-light{background:#e5e7eb;}

.hidden{display:none;}

.company-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-bottom:10px;
}

#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#16a34a;
  color:#fff;
  padding:12px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
#toast.show{opacity:1;}
.error-toast{background:#dc2626;}
</style>
</head>

<body>

<div id="toast"></div>

<div class="container">

<!-- LOGIN -->
<div id="loginPage">
<div class="card">
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button class="btn-primary" onclick="login()">Login</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyPage" class="hidden">
<div class="card">

<h2>Company List</h2>

<input id="searchInput" placeholder="Search..." onkeyup="renderCompanies()">

<button class="btn-primary" onclick="showAddCompanyPage()">Add Company</button>

<input type="file" id="excelFile" class="hidden" onchange="importExcel(event)">
<button class="btn-success" onclick="excelFile.click()">Import Excel</button>

<div id="companyList"></div>

</div>
</div>

<!-- ADD COMPANY -->
<div id="addCompanyPage" class="hidden">
<div class="card">
<h3>Add Company</h3>
<input id="companyNameInput">
<button class="btn-success" onclick="confirmAddCompany()">OK</button>
<button onclick="showCompanyPage()">Back</button>
</div>
</div>

<!-- DEVICE -->
<div id="devicePage" class="hidden">
<div class="card">

<h3 id="deviceTitle"></h3>

<input id="deviceNameInput" placeholder="Device">
<input id="deviceIpInput" placeholder="IP">
<input id="deviceUserInput" placeholder="User">
<input id="devicePassInput" placeholder="Pass">

<button class="btn-primary" onclick="addDevice()">Add Device</button>

<div id="deviceTable"></div>

</div>
</div>

</div>

<script>
const USERS=[
{user:"ccadmin",pass:"CC$upp0rt#1"},
{user:"admin",pass:"12345678"}
];

let companies=[];
let selectedCompanyId=null;

function uid(){return Date.now()+""+Math.random();}

function toast(msg,type="ok"){
let t=document.getElementById("toast");
t.innerText=msg;
t.className="";
if(type=="error") t.classList.add("error-toast");
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function login(){
let u=loginUser.value;
let p=loginPass.value;
let ok=USERS.find(x=>x.user==u&&x.pass==p);
if(ok){
sessionStorage.setItem("login","1");
showCompanyPage();
toast("Login success");
}else toast("ผิด","error");
}

function showCompanyPage(){
hideAll();
companyPage.classList.remove("hidden");
renderCompanies();
}

function showAddCompanyPage(){
hideAll();
addCompanyPage.classList.remove("hidden");
}

function hideAll(){
loginPage.classList.add("hidden");
companyPage.classList.add("hidden");
addCompanyPage.classList.add("hidden");
devicePage.classList.add("hidden");
}

function confirmAddCompany(){
let name=companyNameInput.value.trim();
if(!name) return toast("กรอกชื่อ","error");

companies.push({id:uid(),name,devices:[]});
save();
showCompanyPage();
toast("เพิ่มบริษัทแล้ว");
}

function renderCompanies(){
let q=searchInput.value.toLowerCase();
companyList.innerHTML=companies
.filter(c=>c.name.toLowerCase().includes(q))
.map(c=>`
<div class="company-item">
<div>${c.name}</div>
<div>
<button onclick="openCompany('${c.id}')">Open</button>
<button class="btn-danger" onclick="delCompany('${c.id}')">Del</button>
</div>
</div>
`).join("");
}

function delCompany(id){
companies=companies.filter(c=>c.id!=id);
save();
renderCompanies();
toast("ลบแล้ว");
}

function openCompany(id){
selectedCompanyId=id;
let c=companies.find(x=>x.id==id);
deviceTitle.innerText=c.name;
hideAll();
devicePage.classList.remove("hidden");
renderDevices();
}

function addDevice(){
let c=companies.find(x=>x.id==selectedCompanyId);

let d={
id:uid(),
name:deviceNameInput.value,
ip:deviceIpInput.value,
user:deviceUserInput.value,
pass:devicePassInput.value
};

if(!d.name||!d.ip) return toast("กรอกให้ครบ","error");

c.devices.push(d);
save();
renderDevices();
toast("เพิ่ม device แล้ว");
}

function renderDevices(){
let c=companies.find(x=>x.id==selectedCompanyId);

deviceTable.innerHTML=`
<table border=1 width=100%>
<tr><th>Device</th><th>IP</th><th>Action</th></tr>
${c.devices.map(d=>`
<tr>
<td>${d.name}</td>
<td>${d.ip}</td>
<td><button class="btn-danger" onclick="delDevice('${d.id}')">Del</button></td>
</tr>
`).join("")}
</table>
`;
}

function delDevice(id){
let c=companies.find(x=>x.id==selectedCompanyId);
c.devices=c.devices.filter(d=>d.id!=id);
save();
renderDevices();
}

function save(){
localStorage.setItem("data",JSON.stringify(companies));
}

function load(){
let d=localStorage.getItem("data");
if(d) companies=JSON.parse(d);
}

function importExcel(e){
let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=function(evt){
let data=new Uint8Array(evt.target.result);
let wb=XLSX.read(data,{type:"array"});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

let count=0;

rows.forEach(r=>{
let company=r.Customer||r.Company;
let device=r.Equipment||r.Device;
let ip=r["IP Address"]||r.IP;

if(!company||!device||!ip) return;

let c=companies.find(x=>x.name==company);
if(!c){
c={id:uid(),name:company,devices:[]};
companies.push(c);
}

if(c.devices.find(x=>x.ip==ip)) return;

c.devices.push({id:uid(),name:device,ip});
count++;
});

save();
renderCompanies();
toast("Import "+count+" รายการ");
};

reader.readAsArrayBuffer(file);
}

load();

if(sessionStorage.getItem("login")) showCompanyPage();
</script>

</body>
</html>
