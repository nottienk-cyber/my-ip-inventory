<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Inventory</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-light { background: #e5e7eb; color: #111827; }
    .btn-warning { background: #d97706; color: #fff; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .col {
      flex: 1;
      min-width: 220px;
    }
    .empty {
      padding: 16px;
      background: #f9fafb;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      color: #475569;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="center-box">
      <div class="card">
        <h2>Login</h2>
        <input type="text" id="loginUser" placeholder="Username" />
        <input type="password" id="loginPass" placeholder="Password" />
        <div id="loginError" class="error hidden">Username หรือ Password ไม่ถูกต้อง</div>
        <button class="btn-primary" onclick="login()">Login</button>
        <p class="muted">ค่าเริ่มต้น: admin / 1234</p>
      </div>
    </div>

    <!-- COMPANY PAGE -->
    <div id="companyPage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>Company List</h1>
            <div class="muted">เพิ่ม / ลบบริษัท แล้วกด Save</div>
          </div>
          <div>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <!-- Add Company -->
        <div class="row">
          <div class="col">
            <input type="text" id="companyNameInput" placeholder="ชื่อบริษัท" />
          </div>
          <div>
            <button class="btn-primary" onclick="addCompany()">Add Company</button>
            <button class="btn-success" onclick="saveCompanies()">Save Companies</button>
          </div>
        </div>

        <div id="companyList"></div>
      </div>
    </div>

    <!-- DEVICE PAGE -->
    <div id="devicePage" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 id="devicePageTitle">Devices</h2>
            <div class="muted">เพิ่ม / ลบอุปกรณ์ แล้วกด Save</div>
          </div>
          <div>
            <button class="btn-light" onclick="backToCompanies()">Back</button>
            <button class="btn-secondary" onclick="logout()">Logout</button>
          </div>
        </div>

        <table id="deviceTable">
          <thead>
            <tr>
              <th>Device</th>
              <th>IP</th>
              <th>Username</th>
              <th>Password</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="deviceList"></tbody>
        </table>

        <div class="row">
          <div class="col">
            <input type="text" id="deviceNameInput" placeholder="Device Name" />
          </div>
          <div class="col">
            <input type="text" id="deviceIpInput" placeholder="IP Address" />
          </div>
          <div class="col">
            <input type="text" id="deviceUserInput" placeholder="Username" />
          </div>
          <div class="col">
            <input type="text" id="devicePassInput" placeholder="Password" />
          </div>
        </div>

        <div id="deviceError" class="error hidden">กรอก Device / IP / Username / Password ให้ครบก่อน</div>

        <button class="btn-primary" onclick="addDevice()">Add Device</button>
        <button class="btn-success" onclick="saveDevices()">Save Devices</button>
      </div>
    </div>

  </div>

  <script>
    const APP_LOGIN_USER = "admin";
    const APP_LOGIN_PASS = "1234";

    let companies = [];
    let selectedCompanyId = null;

    function uid() {
      return Date.now().toString() + Math.floor(Math.random() * 1000).toString();
    }

    function loadData() {
      const data = localStorage.getItem("ip_inventory_data");
      if (data) {
        companies = JSON.parse(data);
      } else {
        companies = [
          {
            id: uid(),
            name: "ABC Co.,Ltd.",
            devices: [
              { id: uid(), name: "FortiGate", ip: "192.168.1.1", user: "admin", pass: "pass123" },
              { id: uid(), name: "Switch", ip: "192.168.1.2", user: "cisco", pass: "cisco123" }
            ]
          },
          {
            id: uid(),
            name: "XYZ Co.,Ltd.",
            devices: [
              { id: uid(), name: "Access Point", ip: "10.0.0.1", user: "ubnt", pass: "ubnt123" }
            ]
          }
        ];
        persist();
      }
    }

    function persist() {
      localStorage.setItem("ip_inventory_data", JSON.stringify(companies));
    }

    function login() {
      const u = document.getElementById("loginUser").value.trim();
      const p = document.getElementById("loginPass").value.trim();
      const err = document.getElementById("loginError");

      if (u === APP_LOGIN_USER && p === APP_LOGIN_PASS) {
        sessionStorage.setItem("ip_inventory_logged_in", "1");
        err.classList.add("hidden");
        showCompanyPage();
      } else {
        err.classList.remove("hidden");
      }
    }

    function logout() {
      sessionStorage.removeItem("ip_inventory_logged_in");
      selectedCompanyId = null;
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      showLoginPage();
    }

    function isLoggedIn() {
      return sessionStorage.getItem("ip_inventory_logged_in") === "1";
    }

    function showLoginPage() {
      document.getElementById("loginPage").classList.remove("hidden");
      document.getElementById("companyPage").classList.add("hidden");
      document.getElementById("devicePage").classList.add("hidden");
    }

    function showCompanyPage() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("companyPage").classList.remove("hidden");
      document.getElementById("devicePage").classList.add("hidden");
      renderCompanies();
    }

    function showDevicePage(companyId) {
      selectedCompanyId = companyId;
      const company = companies.find(c => c.id === companyId);
      document.getElementById("devicePageTitle").innerText = "Devices - " + company.name;
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("companyPage").classList.add("hidden");
      document.getElementById("devicePage").classList.remove("hidden");
      document.getElementById("deviceError").classList.add("hidden");
      clearDeviceInputs();
      renderDevices();
    }

    function addCompany() {
      const input = document.getElementById("companyNameInput");
      const name = input.value.trim();
      if (!name) return;

      companies.push({
        id: uid(),
        name: name,
        devices: []
      });

      input.value = "";
      renderCompanies();
    }

    function deleteCompany(companyId) {
      if (!confirm("ลบบริษัทนี้ใช่ไหม?")) return;
      companies = companies.filter(c => c.id !== companyId);
      renderCompanies();
    }

    function saveCompanies() {
      persist();
      alert("บันทึกบริษัทเรียบร้อย");
    }

    function renderCompanies() {
      const wrap = document.getElementById("companyList");

      if (companies.length === 0) {
        wrap.innerHTML = '<div class="empty">ยังไม่มีบริษัท</div>';
        return;
      }

      wrap.innerHTML = companies.map(company => `
        <div class="company-item">
          <div>
            <div class="company-name">${company.name}</div>
            <div class="muted">Devices: ${company.devices.length}</div>
          </div>
          <div>
            <button class="btn-warning" onclick="showDevicePage('${company.id}')">Open</button>
            <button class="btn-danger" onclick="deleteCompany('${company.id}')">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function backToCompanies() {
      showCompanyPage();
    }

    function addDevice() {
      const name = document.getElementById("deviceNameInput").value.trim();
      const ip = document.getElementById("deviceIpInput").value.trim();
      const user = document.getElementById("deviceUserInput").value.trim();
      const pass = document.getElementById("devicePassInput").value.trim();
      const err = document.getElementById("deviceError");

      if (!name || !ip || !user || !pass) {
        err.classList.remove("hidden");
        return;
      }

      err.classList.add("hidden");

      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      company.devices.push({
        id: uid(),
        name,
        ip,
        user,
        pass
      });

      clearDeviceInputs();
      renderDevices();
    }

    function clearDeviceInputs() {
      document.getElementById("deviceNameInput").value = "";
      document.getElementById("deviceIpInput").value = "";
      document.getElementById("deviceUserInput").value = "";
      document.getElementById("devicePassInput").value = "";
    }

    function deleteDevice(deviceId) {
      if (!confirm("ลบอุปกรณ์นี้ใช่ไหม?")) return;
      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;
      company.devices = company.devices.filter(d => d.id !== deviceId);
      renderDevices();
    }

    function saveDevices() {
      persist();
      alert("บันทึกอุปกรณ์เรียบร้อย");
    }

    function renderDevices() {
      const wrap = document.getElementById("deviceList");
      const company = companies.find(c => c.id === selectedCompanyId);
      if (!company) return;

      const deviceList = company.devices.map(device => `
        <tr>
          <td>${device.name}</td>
          <td>${device.ip}</td>
          <td>${device.user}</td>
          <td>${device.pass}</td>
          <td>
            <button class="btn-danger" onclick="deleteDevice('${device.id}')">Delete</button>
          </td>
        </tr>
      `).join("");

      wrap.innerHTML = deviceList;
    }

    loadData();

    if (isLoggedIn()) {
      showCompanyPage();
    } else {
      showLoginPage();
    }
  </script>
</body>
</html>
