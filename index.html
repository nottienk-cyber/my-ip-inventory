<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP Inventory - All-in-One Professional</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; font-family: 'Inter', 'Kanit', sans-serif; }
    body { background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; position: relative; }
    .hidden { display: none !important; }
    
    /* --- LOGO STYLING --- */
    .top-logo {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 500;
    }
    .top-logo img {
      height: 60px; /* ปรับขนาดความสูงตามความเหมาะสม */
      width: auto;
      object-fit: contain;
    }

    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--card); border-radius: 16px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); position: relative; }

    /* --- LOGIN UI --- */
    .login-box { position: relative; width: 100%; }
    .toggle-password { position: absolute; right: 12px; top: 12px; cursor: pointer; color: var(--muted); background: none; border: none; padding: 0; font-size: 18px; }

    /* --- TABLE UI (Copy Friendly) --- */
    .table-wrap { margin-top: 15px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: white; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { background: #f8fafc; padding: 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; text-align: left; border-bottom: 2px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; word-wrap: break-word; word-break: break-all; }

    .col-device { width: 25%; }
    .col-ip     { width: 25%; }
    .col-user   { width: 18%; }
    .col-pass   { width: 17%; }
    .col-action { width: 15%; text-align: center; }

    .flex-cell { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .code-badge { font-family: monospace; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-size: 13px; color: #334155; }
    .btn-copy { cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: 12px; color: var(--muted); transition: 0.2s; }
    .btn-copy:hover { background: var(--primary); color: white; border-color: var(--primary); }

    /* --- PAGINATION --- */
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .page-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- COMMON UI --- */
    button { padding: 10px 18px; border-radius: 10px; cursor: pointer; border: none; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-light { background: #f1f5f9; color: #475569; }
    .btn-warning { background: #fef3c7; color: #d97706; padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #fee2e2; color: #dc2626; padding: 6px 12px; font-size: 12px; }
    input.form-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; outline: none; }
    
    #toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; transform: translateY(100px); transition: 0.3s; z-index: 9999; }
    #toast.show { transform: translateY(0); }

    .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
    .company-item { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
    .company-item:hover { border-color: var(--primary); transform: translateY(-2px); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 450px; max-width: 95%; }

    /* Responsive adjustments for Logo */
    @media (max-width: 768px) {
      .top-logo img { height: 40px; }
      .container { margin-top: 80px; }
    }
  </style>
</head>
<body>

<div class="top-logo">
  <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACtWK6eAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH6AMCFB0XJR6SfgAAAB1pVFh0Q29tbWVudAAAAAAAQ3JlYXRlZCB3aXRoIEdJTVBkZW3EAAAAnElEQVR42u3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMB8GIAAAf9S99cAAAAASUVORK5CYII=" alt="CC Logo" id="mainLogo">
</div>

<div id="toast">แจ้งเตือน</div>

<div class="container">
  
  <div id="loginPage" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h2 style="margin-bottom: 10px;">Inventory Login</h2>
    <p style="color: var(--muted); margin-bottom: 25px;">CC (Thailand) Co.,Ltd.</p>
    <input type="text" id="loginUser" class="form-input" placeholder="Username">
    
    <div class="login-box">
      <input type="password" id="loginPass" class="form-input" placeholder="Password">
      <button type="button" class="toggle-password" onclick="toggleLoginPass()">👁️</button>
    </div>
    
    <button class="btn-primary" style="width: 100%; justify-content: center;" onclick="login()">Login</button>
  </div>

  <div id="companyPage" class="hidden">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Company List</h2>
        <button class="btn-light" onclick="logout()">Logout</button>
      </div>
      <div id="companyGrid" class="company-grid"></div>
    </div>
  </div>

  <div id="devicePage" class="hidden">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="deviceTitle" style="margin:0">Devices</h2>
        <div style="display: flex; gap: 8px;">
          <button class="btn-light" onclick="showPage('companyPage')">Back</button>
          <button class="btn-primary" onclick="openModal()">+ Add Device</button>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <div>
          Show 
          <select id="rowsPerPage" style="padding: 6px; border-radius: 6px; border: 1px solid var(--border);" onchange="changeRowsPerPage()">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select> entries
        </div>
        <input type="text" id="searchDev" class="form-input" style="width: 250px; margin:0;" placeholder="ค้นหา..." onkeyup="renderDevices()">
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-device">Device Name</th>
              <th class="col-ip">IP / URL</th>
              <th class="col-user">Username</th>
              <th class="col-pass">Password</th>
              <th class="col-action">Action</th>
            </tr>
          </thead>
          <tbody id="deviceTableBody"></tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <div id="pageInfo" style="font-size: 14px; color: var(--muted);">Showing 0 to 0 of 0</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <button id="prevBtn" class="page-btn" onclick="changePage(-1)">Previous</button>
          <span id="currentPageNum" style="font-weight:600">1</span>
          <button id="nextBtn" class="page-btn" onclick="changePage(1)">Next</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="deviceModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0">Device Info</h3>
    <input type="text" id="inName" class="form-input" placeholder="Device Name">
    <input type="text" id="inIp" class="form-input" placeholder="IP Address / URL">
    <input type="text" id="inUser" class="form-input" placeholder="Username">
    <input type="text" id="inPass" class="form-input" placeholder="Password">
    <div style="display: flex; gap: 10px;">
      <button class="btn-light" style="flex: 1; justify-content: center;" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex: 1; justify-content: center;" onclick="saveDevice()">Save</button>
    </div>
  </div>
</div>

<script>
  // **สำคัญ**: คุณต้องอัปโหลดรูป Logo ไปไว้ใน Supabase Storage หรือ Link ที่เข้าถึงได้ 
  // แล้วเอา URL มาใส่ใน <img src="..."> ด้านบนครับ
  
  const SUPABASE_URL = "https://axluexlgltkrmnytswwq.supabase.co";
  const SUPABASE_KEY = "sb_publishable_qgjQeHyWCoBQ2ruSu5vfAg_MagAFIul";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allCompanies = [], allDevices = [], selectedCompany = null, editingDeviceId = null;
  let currentPage = 1, rowsPerPage = 10;

  function toggleLoginPass() {
    const p = document.getElementById("loginPass");
    const b = document.querySelector(".toggle-password");
    if (p.type === "password") { p.type = "text"; b.innerText = "🕶️"; } 
    else { p.type = "password"; b.innerText = "👁️"; }
  }

  function login() {
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPass").value.trim();
    if ((u === "admin" && p === "12345678") || (u === "ccadmin" && p === "CC$upp0rt#1")) {
      sessionStorage.setItem("isLoggedIn", "true");
      showPage('companyPage');
    } else alert("Invalid Login");
  }

  function logout() { sessionStorage.clear(); window.location.reload(); }

  function showPage(pageId) {
    document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'companyPage') loadCompanies();
  }

  async function loadCompanies() {
    const { data } = await db.from('companies').select('*').order('name');
    allCompanies = data || [];
    document.getElementById("companyGrid").innerHTML = allCompanies.map(c => `
      <div class="company-item" onclick="goToDevices('${c.id}', '${c.name}')">
        <strong>${c.name}</strong> <span>→</span>
      </div>
    `).join("");
  }

  async function goToDevices(id, name) {
    selectedCompany = { id, name };
    document.getElementById("deviceTitle").innerText = name;
    currentPage = 1; loadDevices(); showPage('devicePage');
  }

  async function loadDevices() {
    const { data } = await db.from('devices').select('*').eq('company_id', selectedCompany.id).order('created_at', {ascending: false});
    allDevices = data || [];
    renderDevices();
  }

  async function copyToClipboard(text) {
    if(!text || text === '-') return;
    await navigator.clipboard.writeText(text);
    showToast("คัดลอกแล้ว! ✅");
  }

  function renderDevices() {
    const tbody = document.getElementById("deviceTableBody");
    const term = document.getElementById("searchDev").value.toLowerCase();
    const filtered = allDevices.filter(d => (d.name+d.ip+d.username+d.password).toLowerCase().includes(term));
    
    const total = filtered.length;
    const totalPages = Math.ceil(total / rowsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * rowsPerPage;
    const paginated = filtered.slice(start, start + parseInt(rowsPerPage));

    tbody.innerHTML = paginated.map(d => `
      <tr>
        <td><strong>${d.name || '-'}</strong></td>
        <td>
          <div class="flex-cell">
            <span class="code-badge">${d.ip || '-'}</span>
            <button class="btn-copy" onclick="copyToClipboard('${d.ip}')">📋</button>
          </div>
        </td>
        <td>
          <div class="flex-cell">
            <span>${d.username || '-'}</span>
            <button class="btn-copy" onclick="copyToClipboard('${d.username}')">📋</button>
          </div>
        </td>
        <td>
          <div class="flex-cell">
            <span class="code-badge">${d.password || '-'}</span>
            <button class="btn-copy" onclick="copyToClipboard('${d.password}')">📋</button>
          </div>
        </td>
        <td class="col-action">
          <button class="btn-warning" onclick="openModal('${d.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteDevice('${d.id}')">Del</button>
        </td>
      </tr>`).join("");

    document.getElementById("currentPageNum").innerText = currentPage;
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = currentPage === totalPages || total === 0;
    const dEnd = Math.min(start + parseInt(rowsPerPage), total);
    document.getElementById("pageInfo").innerText = `Showing ${total === 0 ? 0 : start+1} to ${dEnd} of ${total}`;
  }

  function changePage(dir) { currentPage += dir; renderDevices(); }
  function changeRowsPerPage() { rowsPerPage = document.getElementById("rowsPerPage").value; currentPage = 1; renderDevices(); }

  function openModal(id = null) {
    editingDeviceId = id;
    if(id) {
      const d = allDevices.find(x => x.id === id);
      document.getElementById("inName").value = d.name;
      document.getElementById("inIp").value = d.ip;
      document.getElementById("inUser").value = d.username;
      document.getElementById("inPass").value = d.password;
    } else {
      ["inName", "inIp", "inUser", "inPass"].forEach(i => document.getElementById(i).value = "");
    }
    document.getElementById("deviceModal").classList.remove("hidden");
  }

  function closeModal() { document.getElementById("deviceModal").classList.add("hidden"); }

  async function saveDevice() {
    const payload = {
      name: document.getElementById("inName").value,
      ip: document.getElementById("inIp").value,
      username: document.getElementById("inUser").value,
      password: document.getElementById("inPass").value,
      company_id: selectedCompany.id
    };
    if (editingDeviceId) await db.from('devices').update(payload).eq('id', editingDeviceId);
    else await db.from('devices').insert([payload]);
    showToast("สำเร็จ ✅"); closeModal(); loadDevices();
  }

  async function deleteDevice(id) {
    if(confirm("ลบ?")) { await db.from('devices').delete().eq('id', id); showToast("ลบแล้ว 🗑️"); loadDevices(); }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  window.onload = () => { if(sessionStorage.getItem("isLoggedIn")) showPage('companyPage'); };
</script>
</body>
</html>
